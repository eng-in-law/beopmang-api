name: Load Test

on:
  workflow_dispatch:
    inputs:
      agents:
        description: '동시 에이전트 수'
        default: '50'
        type: string
      calls_per_agent:
        description: '에이전트당 호출 수'
        default: '5'
        type: string

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - name: Run load test
        run: |
          AGENTS=${{ inputs.agents }}
          CALLS=${{ inputs.calls_per_agent }}

          URLS=(
            'https://api.beopmang.org/api/v3/law?action=find&q=%EB%AF%BC%EB%B2%95'
            'https://api.beopmang.org/api/v3/law?action=explore&law_id=001706'
            'https://api.beopmang.org/api/v3/law?action=article&law=001706&label=%EC%A0%9C750%EC%A1%B0'
            'https://api.beopmang.org/api/v3/case?action=search&q=%EC%86%90%ED%95%B4%EB%B0%B0%EC%83%81'
            'https://api.beopmang.org/api/v3/graph?action=xref&law_id=001706'
            'https://api.beopmang.org/api/v3/search?action=keyword&q=%EA%B0%9C%EC%9D%B8%EC%A0%95%EB%B3%B4'
            'https://api.beopmang.org/api/v3/law?action=research&q=%EB%AF%BC%EB%B2%95'
            'https://api.beopmang.org/api/v3/help?action=stats'
          )

          simulate_agent() {
            local id=$1 ok=0 fail=0 total_time=0
            for j in $(seq 1 $CALLS); do
              idx=$(( (id * CALLS + j) % ${#URLS[@]} ))
              result=$(curl -s -o /dev/null -w '%{http_code} %{time_total}' "${URLS[$idx]}" --max-time 30)
              code=$(echo $result | awk '{print $1}')
              time=$(echo $result | awk '{print $2}')
              [ "$code" = "200" ] && ok=$((ok+1)) || fail=$((fail+1))
            done
            echo "$id:ok=$ok,fail=$fail"
          }

          echo "=== Load Test: $AGENTS agents × $CALLS calls ==="
          START=$(date +%s)
          for i in $(seq 1 $AGENTS); do
            simulate_agent $i &
          done
          wait
          END=$(date +%s)
          DURATION=$((END-START))

          echo ""
          echo "=== Results ==="
          echo "Duration: ${DURATION}s"

          # 결과 파일에서 집계
          TOTAL_OK=0 TOTAL_FAIL=0
          # (위에서 stdout으로 출력된 결과 파싱은 job summary로)

      - name: Parse results
        run: |
          echo "## Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Agents: ${{ inputs.agents }}" >> $GITHUB_STEP_SUMMARY
          echo "- Calls/agent: ${{ inputs.calls_per_agent }}" >> $GITHUB_STEP_SUMMARY
          echo "- Total requests: $(( ${{ inputs.agents }} * ${{ inputs.calls_per_agent }} ))" >> $GITHUB_STEP_SUMMARY
